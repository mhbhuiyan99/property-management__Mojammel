<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StayFinder{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="{% url 'property_app:home' %}" class="text-2xl font-bold text-rose-600">StayFinder</a>
            <nav class="text-sm text-gray-600">
                <a href="{% url 'property_app:home' %}" class="hover:text-rose-600">Home</a>
                <span class="mx-2">·</span>
                <a href="{% url 'property_app:property-search' %}" class="hover:text-rose-600">Browse all stays</a>
            </nav>
        </div>
    </header>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t mt-12">
        <div class="max-w-6xl mx-auto px-4 py-6 text-sm text-gray-500 text-center">
            StayFinder &mdash; built with Django, GeoDjango, PostGIS &amp; pgvector.
        </div>
    </footer>

</body>
</html>
